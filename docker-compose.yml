services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mcp
      POSTGRES_PASSWORD: mcp_dev_password
      POSTGRES_DB: nba
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init scripts AND the CSV both land here so 02_load.sql can COPY from it.
      - ./init-db:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mcp -d nba"]
      interval: 5s
      timeout: 5s
      retries: 10

  mcp-server:
    build: .
    environment:
      DATABASE_URL: postgresql://mcp:mcp_dev_password@postgres:5432/nba
      MCP_TRANSPORT: streamable-http
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
